# Usage: uv run capx/envs/launch.py --config-path env_configs/real/real.yaml

env:
  _target_: capx.envs.tasks.franka.franka_cube_restack.FrankaRestackCodeEnv
  cfg:
    _target_: capx.envs.tasks.base.CodeExecEnvConfig
    low_level: franka_real_low_level
    privileged: false
    apis:
      - FrankaRealControlApi # Not using reduced skill lib for live demo due to codegen time of low level
    task_only_prompt: "pick up the banana and lift it"
    prompt: |
      You are controlling a Franka Research3 robot with API described below.
      Goal: pick up the banana and lift it.
      You may write python code comments for reasoning but ONLY write the executable Python code and do not write it in code fences.
      After this code executes, you will be able to get a new observation of the environment and write new code to complete the task if needed.
      The functions (APIs) below are already imported to the environment. If you want to use numpy, you need to import it explicitly.
    
    multi_turn_prompt: |
      The following code blocks were just executed:
      ```python
      {executed_code}
      ```
      The current console stdout is:
      ```
      {console_stdout}
      ```
      The current console stderr is:
      ```
      {console_stderr}
      ```
      If there were no errors during compilation or execution, the console stderr will be empty. If there were errors, consider regenerating the code.
      Please respond with EXACTLY ONE of the following:
      - The word 'REGENERATE' followed immediately by new Python code in a fenced code block (```python...```) if you want to modify the code.
      - The word 'FINISH' if the task appears to be complete

api_servers:
  - _target_: capx.serving.launch_sam3_server.main
    device: cuda
    port: 8114
    host: 127.0.0.1
    
  - _target_: capx.serving.launch_contact_graspnet_server.main
    port: 8115
    host: 127.0.0.1

  - _target_: capx.serving.launch_pyroki_server.main
    port: 8116
    host: 127.0.0.1
    robot: fr3_description
    target_link: panda_hand

record_video: true
use_img_differencing: true
output_dir: ./outputs/franka_real
debug: true

web_ui: true          # set to false to prevent launching the interactive web UI and instead use headless CLI
# web_ui_port: 8200    # optional: override the default web UI port

trials: 1
num_workers: 1
